# Scoring configuration — this file is the ONLY place the severity formula lives.
# Edits here take effect on next backend reload. Never bury weights or the
# formula in code.
version: 1

# The formula is a plain Python arithmetic expression evaluated with these
# three variables in scope:
#   concentration      — HHI in [0, 1] (sum of squared supplier shares)
#   substitutability   — in [0, 1] (0 = no substitute, 1 = perfect)
#   lead_time          — normalized lead-time (see lead_time.normalization)
# All three are also multiplied by their weight before being passed in.
formula: "concentration * (1 - substitutability) * lead_time"

weights:
  concentration: 1.0
  substitutability: 1.0
  lead_time: 1.0

concentration:
  # Two independent axes are computed and combined:
  #   inbound_hhi     — HHI of the node's supplier shares (from in-edges).
  #                     Captures "dangerously dependent" (gallium, dysprosium).
  #   outbound_criticality — root-sum-square of downstream max-path-influences,
  #                     normalized to graph max. Captures "dangerously
  #                     depended-upon" (ASML, TSMC, HBM, CoWoS).
  #
  # TODO — thin-graph artifacts on nodes with only one modeled input.
  # Quanta Services HHI = 1.0 because copper is the only in-edge we model.
  # xAI / OpenAI HHI = 0.78 because NVIDIA is the only in-edge we model.
  # These read as "dangerously single-sourced" but reality is under-modeled:
  # Quanta needs steel/transformers/labor, xAI/OpenAI need power/cooling/etc.
  # Not fixable via config — it's a data-completeness issue. Fix later by
  # adding the missing input edges (steel supply, power supply, cooling).
  #
  # NOTE — scale-axis gap (surfaced by per-stage HHI).
  # Per-stage HHI correctly captures gallium's mining monopoly (~0.97) while
  # leaving copper's refining concentration reading ~0.25. Copper's real
  # paper story is volume + 17–25yr mine lead time, i.e. a scale/demand
  # constraint the current model has no axis for. Concentration is
  # absorbing risk it cannot represent. Adding a scale axis is out of scope
  # for the per-stage fix and is left as an open item.
  inbound:
    # Per-stage HHI: compute HHI for every edge type with edges present on
    # the node (mines, refines, supplies, input_to, component_of), then
    # combine via `combine`. `max` preserves the intent — a node is fragile
    # if ANY inbound stage is concentrated. Averaging reintroduces the
    # dilution the per-stage split exists to remove.
    method: per_stage
    per_stage:
      # `stages` is OPTIONAL. When null (or absent), every edge type in
      # SUPPLY_EDGE_TYPES that has edges present is used — this is the
      # correct default. Listing stages here opts OUT of edge types
      # deliberately (e.g. to model input_to as background context). If
      # a listed stage isn't a valid supply edge type, config load
      # raises immediately rather than silently no-op'ing.
      stages: null
      # `normalize` decides whether shares are divided by their sum before
      # squaring. When true (legacy), a bucket summing to 0.08 reads as
      # HHI 1.00 — incompleteness disappears. When false, HHI = sum of
      # squared raw shares, so an incomplete bucket is dampened in exact
      # proportion to its shortfall. See
      # `docs/edge_weight_semantics_report.md` for the audit and
      # trade-offs. Default true so this flag alone changes no scores.
      normalize: true
      combine: max            # max | weighted_sum
      # Stage-level min_suppliers — same reasoning as the per-category
      # rule one level down (see supplies.per_category below). A stage
      # bucket with fewer than N distinct modelled sources reads as
      # HHI 1.0 under `normalize: true` (a single share normalizes to
      # itself), which cannot distinguish a real monopoly from data we
      # simply haven't finished modelling. Excluded from the combine and
      # surfaced in the completeness backlog. If EVERY stage on a node
      # is single-supplier, inbound_hhi falls to 0 (no reliable signal)
      # and the node is flagged on dynamic.all_stages_single_supplier.
      # See docs/outbound_output_share_spec.md §1.
      min_suppliers_for_concentration: 2
      weights:                # used only when combine = weighted_sum
        mines: 1.0
        refines: 1.0
        supplies: 1.0
        input_to: 1.0
        component_of: 1.0
      # Per-category HHI within the `supplies` stage. Splits a target's
      # supplies bucket into sub-buckets keyed by Edge.supply_category
      # (lithography, deposition, etch, inspection, foundry_wafers,
      # memory, packaging, power_equipment, cooling, power_generation,
      # gpu_accelerators, ai_asics, general). Same reasoning as per-stage
      # HHI one level down: a target is fragile if ANY single category is
      # single-sourced. When disabled, supplies HHI reads the aggregate
      # bucket (legacy behaviour). Default enabled; the `normalize` flag
      # from the parent per_stage block applies to each sub-bucket.
      supplies:
        per_category:
          enabled: true
          combine: max          # max | weighted_sum
          # A category with fewer than N modelled suppliers cannot distinguish
          # a real monopoly from an unmodelled market. Such buckets are
          # excluded from the `combine` step and surfaced in the completeness
          # backlog (see docs/category_validation_spec.md §2). Default 2 —
          # meaning any category with only one modelled supplier is treated
          # as incomplete data rather than concentration signal. If EVERY
          # supplies category on a node falls below this threshold, the
          # node's supplies HHI falls back to the aggregate reading and
          # the node is flagged.
          min_suppliers_for_concentration: 2
  outbound:
    decay_per_hop: 0.7         # geometric decay per hop of downstream walk
    max_hops: 6
    min_influence: 1e-6        # prune paths below this
    # Which edge field the downstream walk multiplies at each hop.
    # `output_share` is the correct quantity for outbound criticality
    # ("how much of the supplier's OUTPUT depends on this customer");
    # `input_share` is what most edges have.
    #
    # DEFAULT REVERTED TO input_share in the honesty-fixes pass: only 5
    # of 194 supply-flow edges carry a real output_share (2.8% coverage).
    # Mixing populated and fallback edges ranked KLA above ASML because
    # ASML's own edges carry real output_share (0.40 / 0.20 / 0.15)
    # while KLA's fall back to input_share (0.90 / 0.85 / 0.80).
    # Populating real data penalized the node it was populated for.
    # Uniform on input_share is uniformly imperfect but comparable.
    # When output_share coverage reaches ~50%+, this default flips back.
    # See docs/scoring_honesty_fixes_spec.md §2.
    share_field: input_share        # input_share | output_share
    fallback_to_input_share: true
    # How normalized outbound is computed from raw walk values.
    # See docs/scoring_correctness_fixes_spec.md §2.
    #
    #   graph_max — legacy: divide by the current graph's max raw
    #               outbound. Scores are RELATIVE and shift whenever any
    #               node's outbound changes, which contaminates every
    #               before/after comparison and breaks multi-domain
    #               scoring.
    #   fixed     — default. Divide by `fixed_reference` (a constant).
    #               Scores are comparable across runs and graph edits.
    #               Values above 1.0 are clamped so [0, 1] holds.
    #
    # `fixed_reference` re-derived under the honesty-fixes-pass default
    # config (share_field: input_share, missing_static_axes: unscored)
    # and committed here so it no longer moves. See report §3 for full
    # top-10 raw-outbound table and the identity of the reference node.
    normalization:
      mode: fixed
      # Derived from ASML's raw outbound under the honesty-fixes-pass
      # default config (share_field: input_share, missing_static_axes:
      # unscored). ASML is #1 at 1.6711 raw; TSMC #2 at 1.535; KLA #3
      # at 1.524. Full top-15 in report §3.
      fixed_reference: 1.6711394969476698
  combine:
    # `max` — a node is severe if EITHER axis is high. Averaging would wash
    # ASML out; do not switch to weighted_sum without a reason.
    method: max                # max | weighted_sum
    inbound_weight: 1.0        # used only when method = weighted_sum
    outbound_weight: 1.0

lead_time:
  # Optional dampener so a 25-year copper mine doesn't dwarf a 3-year fab
  # by pure magnitude. Set to "identity" to disable.
  normalization: "log10_1p"    # log10(years + 1) / log10(26); ~1.0 at 25 yrs

# How to score a node whose substitutability or lead_time_years is
# missing. See docs/scoring_honesty_fixes_spec.md §1.
#
#   suppress — legacy: sub=0.5, lead=1.0 → 0.107 multiplier. Absence
#              reads as safety. Silently deflates 42 of 66 nodes.
#   neutral  — missing term contributes 1.0. Absence reads as maximum
#              danger. Puts NVIDIA at 0.980 above dysprosium's 0.545.
#   unscored — default. Refuse to score: severity=null, tier=`unscored`.
#              Concentration and HHI still compute; only severity is
#              withheld. The completeness backlog gets a visible entry
#              per axis-name. In a multiplicative model there is no
#              neutral constant — every constant is a claim about data
#              that does not exist. `unscored` refuses the claim.
missing_static_axes:
  mode: unscored
  legacy_substitutability: 0.5
  legacy_lead_time_years: 1.0

# Chokepoint tier thresholds — applied to the node's baseline severity
# (its static axes, no event delta). Tiers are DERIVED from these, not
# hand-asserted, so the flag can never disagree with the score.
#
# ORIGINAL 2026-07 CALIBRATION IS STALE.
# The thresholds below were calibrated against a 63-node distribution
# that (a) predates the stage-level min_suppliers rule, (b) predates
# the unscored mode, (c) predates the input_share revert, and (d) was
# authored against a prose reading of the paper's chokepoint set that
# no longer matches what the model produces. Under the current default
# scoring config:
#   HBM lands at `high` (concentration-capped at inbound_hhi 0.44).
#   RF & Power Semis lands at `none` (single-input_to stage zeroed by
#     the min_suppliers rule; insufficient outbound to compensate).
# The threshold-recalibration pass will run against
# docs/generated/node_inventory.md § C; do not re-anchor these values
# from prose in the meantime. Both known-miss cases are xfail-marked
# in backend/tests/test_paper_chokepoints.py with named reasons.
chokepoint_thresholds:
  critical: 0.225
  high: 0.13
  moderate: 0.05
  # anything below moderate → none

# Cascade / propagation configuration
#
# SCAFFOLD — decay_per_hop is a flat rate for every edge type. Invisible with
# short paths, but once the graph fills in this will let a critical two-hop
# dependency score below a trivial one-hop dependency purely on hop count.
# The right target is edge-type-aware decay — a sole-source `supplies` edge
# should decay far less than a `substitutes_for` edge — but that requires a
# distribution of graph paths to calibrate against. Treat this the same way
# as the severity formula: a heuristic scaffold to be validated, not a law.
cascade:
  # Fraction of severity retained per hop, before edge-weight scaling.
  decay_per_hop: 0.6
  # Which node field is used as the downstream dampener. v0: manual 0-1 value
  # per company. Later this can become a composite (cash / debt / diversification).
  financial_cushion_proxy: "static.financial_cushion"
  # Traversal depth cap so pathological graphs cannot blow up.
  max_hops: 6
  # Same share-field flags as outbound above — see the reasoning there
  # for why the default is input_share until output_share coverage rises.
  share_field: input_share        # input_share | output_share
  fallback_to_input_share: true

# Company rating — scalar in [-1, 1] is the source of truth. Labels are
# derived from these thresholds. Retune after seeing real distributions.
rating:
  thresholds:
    bearish_below: -0.33
    bullish_above:  0.33
