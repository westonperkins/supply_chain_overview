# Narration configuration — this file is the ONLY place panel wording lives.
# Code assembles; this file decides phrasing. Never build sentences in Python.
version: 1

# --------------------------------------------------------------------------- #
# Word-scales                                                                  #
# --------------------------------------------------------------------------- #

scales:
  # Which axis won the concentration max() determines which list is used.
  # Ordered high → low; first entry whose min <= value wins.
  concentration_inbound:
    - {min: 0.85, phrase: "one source controls almost all supply"}
    - {min: 0.50, phrase: "supply is dominated by a single source"}
    - {min: 0.25, phrase: "supply is concentrated among a few sources"}
    - {min: 0.15, phrase: "supply is moderately spread"}
    - {min: 0.00, phrase: "supply is broadly diversified"}

  concentration_outbound:
    - {min: 0.70, phrase: "almost everything downstream runs through it"}
    - {min: 0.40, phrase: "a large share of the chain depends on it"}
    - {min: 0.15, phrase: "several downstream nodes depend on it"}
    - {min: 0.00, phrase: "little downstream depends on it"}

  substitutability:   # 0 = no substitute, 1 = perfect substitute
    - {min: 0.70, phrase: "it is readily substitutable"}
    - {min: 0.40, phrase: "workable substitutes exist"}
    - {min: 0.20, phrase: "limited substitutes exist"}
    - {min: 0.05, phrase: "substitutes are marginal"}
    - {min: 0.00, phrase: "there is no working substitute"}

  lead_time_years:
    - {min: 10.0, phrase: "replacing it would take over a decade"}
    - {min: 5.0,  phrase: "replacing it would take five to ten years"}
    - {min: 3.0,  phrase: "replacing it would take three to five years"}
    - {min: 1.0,  phrase: "replacing it would take one to three years"}
    - {min: 0.0,  phrase: "replacing it would take under a year"}

# --------------------------------------------------------------------------- #
# Edge-type sentence templates                                                 #
# --------------------------------------------------------------------------- #
# Shares render largest-first, top 3, then "and others".
# mines and refines ALWAYS produce separate sentences, even when the same
# country appears in both. That distinction is the paper's.

edges:
  mines:
    upstream:   "Mined in {sources_with_shares}."
    downstream: "Feeds {targets}."
  refines:
    upstream:   "Refined into usable form by {sources_with_shares}."
    downstream: "Refines {targets}."
  supplies:
    upstream:   "Supplied by {sources_with_shares}."
    downstream: "Supplies {targets}."
  input_to:
    upstream:   "Uses {sources_with_shares} as input."
    downstream: "Feeds {targets}."
  component_of:
    upstream:   "Built from {sources_with_shares}."
    downstream: "Is a component of {targets}."
  depends_on:
    upstream:   "Depends on {sources}."
    downstream: "{targets} depend on it."
  located_in:
    upstream:   "Located in {source}."
    downstream: "Hosts {targets}."
  operates:
    upstream:   "Operated by {source}."
    downstream: "Operates {targets}."

# Pass I — compact verb phrases for the Glance heaviest-path breadcrumb.
# "China — refines 98% → gallium — input to 90% → RF & Power — …"
# Same edge set as the full templates above, just shorter for a
# breadcrumb line. Frontend maps edge type → glance_verb via this
# config, never hardcoded strings.
edge_glance_verb:
  mines:        "mines"
  refines:      "refines"
  supplies:     "supplies"
  input_to:     "input to"
  component_of: "component of"
  located_in:   "located in"
  operates:     "operates"

chain:
  max_hops: 3
  joiner: ", which supply "
  truncation: "…and onward to {terminal_layer}."

# --------------------------------------------------------------------------- #
# Section titles by node type                                                  #
# --------------------------------------------------------------------------- #

sections:
  default:
    where_from: "Where it comes from"
    what_feeds: "What it feeds"
    why_scores: "Why it scores {tier}"
    if_broke:   "If it broke"
    caveats:    "Caveats"
  company:
    where_from: "What it buys"
    what_feeds: "What it supplies"
  product:
    where_from: "What it's made from"
    what_feeds: "What it goes into"
  facility:
    where_from: "Operator and location"
    what_feeds: "What it produces"
  country:
    where_from: null          # omitted entirely
    what_feeds: "What it supplies"
    why_scores: "Why it matters"

tier_words:
  critical: "critical"
  high:     "high"
  moderate: "moderate"
  none:     "low"             # title becomes "Why it scores low"

# --------------------------------------------------------------------------- #
# Unscored panels                                                              #
# --------------------------------------------------------------------------- #
# A node with baseline_tier == "unscored" (== baseline_severity is None) has
# no severity, so the "Why it scores {tier}" register does not apply.
# Everything here is authored specifically for that case:
#   - a fixed section title that never runs through {tier} substitution
#   - body pieces the builder composes into an honest sentence
# See docs/pass_e_narration_unscored_report.pdf (Pass E).
#
# The builder assembles from these pieces exactly as it assembles the scored
# "why it scores" from the scale phrases — no sentence text lives in Python.

# --------------------------------------------------------------------------- #
# Glance strip — one-sentence role summary per node type                       #
# --------------------------------------------------------------------------- #
# The trail-narration strip below the Level 0 Glance shows a single sentence
# per hovered/pinned node. Sentences are ASSEMBLED from these pieces per
# node type — no prose composed in TypeScript. Placeholders are filled by
# the builder from derived quantities the panels already use:
#   {name}, {sub_category}, {tier_word}, {top_source}, {top_source_share},
#   {top_target}, {top_target_share}, {n_supplies}, {n_supplies_kind},
#   {concentration_phrase}, {mines_or_refines_count}, {country_role}
# Missing pieces are omitted (the whole clause with a missing placeholder
# drops out) so the sentence never contains "{...}" or an empty clause.

glance_summary:
  mineral:
    # e.g. "A modelled input material mined mainly in China (98.0% share) and
    # fed into gallium arsenide."
    template: "A modelled input material {mines_hedge}mined mainly in {top_source} ({top_source_share} share){feeds_into_clause}."
    feeds_into_clause: " and fed into {top_target}"
    mines_hedge: ""

  product:
    template: "A downstream product built primarily from {top_source} and consumed by {top_target}."

  company:
    template: "A {sub_category_phrase}{role_tail}{feeds_tail}."
    role_tail: " supplied primarily by {top_source} ({top_source_share} share)"
    feeds_tail: " that supplies {top_target}"

  facility:
    template: "A specific facility{operator_clause}{location_tail}{produces_tail}."
    operator_clause: " operated by {top_operator}"
    location_tail: " in {top_location}"
    produces_tail: " that produces {top_target}"

  country:
    # Countries in this graph are supply-source geographies.
    template: "A supply-source country that {country_role}."
    role_phrase_mines_refines: "mines or refines a majority share of {mines_or_refines_count} modelled mineral(s)"
    role_phrase_hosts_only: "hosts {n_hosts} modelled node(s) but is not itself a supply source in the graph"
    role_phrase_none: "is present in the graph but supplies no material and hosts no node"

unscored:
  section_titles:
    why_scores: "Why this isn't scored"

  body:
    intro: "This node isn't scored."

    # Per-axis reason phrases. Key matches the axis name recorded on
    # node.dynamic.scored_on_default_axes by the scoring engine — the
    # single source of truth (Pass A `unscored` mode).
    missing_axes:
      substitutability: "no substitutability value on record"
      lead_time_years:  "no lead-time value on record"

    # Prefix + joiner for the missing-axis clause. The builder produces
    # "Missing: <axis-phrase1> and <axis-phrase2>." or the singular form.
    missing_prefix: "Missing:"

    # Fallback used ONLY when scored_on_default_axes is empty/None yet
    # baseline_severity is None (defensive — engine invariants say this
    # should not occur; report §4 names every node that hits this branch
    # so the invariant can be tightened if it ever fires).
    missing_generic: "The required static axes for scoring are absent."

    # Concentration addendum — what IS known, without implying severity.
    # Rendered only when a non-zero concentration value exists on the
    # node. Uses the same concentration scale phrases as the scored
    # path (INV-3: concentration is a real number even for unscored).
    concentration_addendum:
      "Concentration is known ({phrase}, {value:.2f} on a 0–1 scale)."

# --------------------------------------------------------------------------- #
# Confidence hedging                                                           #
# --------------------------------------------------------------------------- #

confidence_hedges:
  measured:  ""               # no hedge
  hard:      ""               # alias for measured (schema uses "hard")
  estimate:  "roughly "
  inference: "on the order of "

# --------------------------------------------------------------------------- #
# Constraints                                                                  #
# --------------------------------------------------------------------------- #

limits:
  max_sentences_per_section: 2
  share_decimal_places: 1

disclaimers:
  company_rating: >-
    Company ratings are analytical signals derived from supply-chain structure.
    Not investment advice.

# --------------------------------------------------------------------------- #
# Acronym glossary — single source of truth, shared with the paper             #
# --------------------------------------------------------------------------- #

acronyms:
  HBM:   "High Bandwidth Memory"
  CoWoS: "Chip on Wafer on Substrate"
  NdFeB: "Neodymium Iron Boron"
  PPA:   "Power Purchase Agreement"
  HHI:   "Herfindahl-Hirschman Index"
  EUV:   "Extreme Ultraviolet"
  IDM:   "Integrated Device Manufacturer"
  RF:    "Radio Frequency"
